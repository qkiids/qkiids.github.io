<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q KIDS - مساحات مصممة بحب</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* الإعدادات العامة */
        body { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; background-color: #fff; color: #333; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        
        /* الهيدر القياسي */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 5%; 
            background-color: #fff; 
            border-bottom: 1px solid #f0f0f0; 
            position: sticky; top: 0; z-index: 100;
        }
        .left-menu-container { font-size: 1.5em; color: #555; cursor: pointer; }
        .left-menu-container:hover { color: #000; }
        .center-logo-container h1 { margin: 0; font-size: 1.8em; color: #222; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;}
        .right-icons-container { display: flex; gap: 20px; font-size: 1.3em; color: #555; }
        .right-icons-container a:hover { color: #000; cursor: pointer; }

        @media (max-width: 600px) {
            .center-logo-container h1 { font-size: 1.4em; }
            .right-icons-container { gap: 15px; font-size: 1.1em; }
        }

        /* البانر الرئيسي */
        .hero { background-color: #f8f6f5; text-align: center; padding: 70px 20px; margin-bottom: 30px;}
        .hero h2 { font-size: 2em; color: #333; margin-bottom: 10px; }
        .hero p { font-size: 1.1em; color: #666; max-width: 550px; margin: 0 auto; line-height: 1.6; }

        /* قسم المنتجات */
        .collection-title { text-align: center; font-size: 1.8em; margin: 40px 0 20px; color: #222; font-weight: 700; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 0 5%; max-width: 1200px; margin: 0 auto 50px; }

        /* كارت المنتج */
        .product-card { text-align: center; background: #fff; transition: 0.3s; border-radius: 4px; overflow: hidden; padding-bottom: 15px;}
        .product-card:hover { transform: translateY(-3px); }
        .product-image { width: 100%; height: 320px; background-color: #eee; object-fit: cover; margin-bottom: 12px; }
        .product-title { font-size: 1.1em; font-weight: 600; color: #333; margin: 0 0 5px; }
        .product-price { font-size: 1em; color: #777; margin-bottom: 12px; }
        .btn-choose { display: inline-block; border: 1px solid #333; color: #333; background: transparent; padding: 7px 25px; font-size: 0.95em; font-weight: 600; border-radius: 2px; transition: 0.3s; }
        .btn-choose:hover { background: #333; color: #fff; }

        /* الفوتر */
        footer { background-color: #fafafa; padding: 30px 20px; text-align: center; color: #777; border-top: 1px solid #eee; margin-top: 30px; font-size: 0.9em; }

        /* الواتساب العائم */
        .whatsapp-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .whatsapp-btn { background-color: #25D366; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.8em; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); transition: 0.3s; }
        .whatsapp-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <header>
        <div class="left-menu-container">
            <i class="fas fa-bars"></i> </div>

        <div class="center-logo-container">
            <a href="index.html"><h1>Q KIDS</h1></a>
        </div>

        <div class="right-icons-container">
            <a href="https://wa.me/201070420400?text=مرحباً، أود البحث عن منتج في Q KIDS" title="بحث">
                <i class="fas fa-search"></i> </a>
            <a href="https://wa.me/201070420400?text=مرحباً، أود مراجعة طلبي في سلة التسوق" title="سلة التسوق">
                <i class="fas fa-shopping-basket"></i> </a>
        </div>
    </header>

    <div class="hero">
        <h2>مساحات تنمو مع طفلك</h2>
        <p>تصميمات معمارية راقية تجمع بين البساطة والأمان، لتخلق بيئة ملهمة لأطفالك.</p>
    </div>

    <h2 class="collection-title">Collection 2026</h2>

    <div class="product-grid">
        
        <div class="product-card">

            <a href="product1.html" class="btn-choose">اختر التفاصيل</a>

        <div class="product-card">
            <!-- ربط الصورة التانية -->
            <img src="kitchen.jpg" alt="مطبخ الأطفال التفاعلي" class="product-image">
            <h3 class="product-title">مطبخ الأطفال التفاعلي</h3>
            <div class="product-price">7,990 ج.م</div>
            <a href="product2.html" class="btn-choose">اختر التفاصيل</a>
        </div>

        <div class="product-card">
            <!-- ربط الصورة التالتة -->
            <img src="box.jpg" alt="دولاب التخزين الذكي" class="product-image">

            <div class="product-price">12,500 ج.م</div>
            <a href="product3.html" class="btn-choose">اختر التفاصيل</a>
        </div>

    </div>

    <footer>
        <p>جميع الحقوق محفوظة © 2026 Q KIDS</p>
    </footer>

    <div class="whatsapp-container">
        <!-- رقمك في الزرار العائم -->
        <a href="https://wa.me/201070420400?text=مرحباً، أريد الاستفسار عن التصميمات المتاحة" class="whatsapp-btn">
            <i class="fab fa-whatsapp"></i> </a>
    </div>

</body>
</html>
