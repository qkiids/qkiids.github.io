<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q KIDS - مساحات مصممة بحب</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* الإعدادات العامة */
        body { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; background-color: #fff; color: #333; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        
        /* الهيدر */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background-color: #fff; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 100; }
        .left-menu-container { font-size: 1.5em; color: #555; cursor: pointer; }
        .center-logo-container h1 { margin: 0; font-size: 1.8em; color: #222; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;}
        
        .right-icons-container { display: flex; align-items: center; gap: 15px; font-size: 1.3em; color: #555; }
        .lang-btn { font-size: 0.8em; font-weight: 700; border: 1px solid #555; padding: 2px 6px; border-radius: 50%; cursor: pointer;}
        
        /* البانر الرئيسي - start1.png */
        .hero { 
            background-image: url('start1.png'); 
            background-size: cover; 
            background-position: center; 
            height: 60vh; 
            display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 40px;
        }
        
        /* 🔥 تعديل الزرار: أصغر، لون هادي، وشفاف 🔥 */
        .hero-btn { 
            background-color: rgba(220, 208, 196, 0.75); /* لون بيج هادي وشفاف بنسبة 75% */
            color: #112d4e; /* لون خط كحلي غامق واضح */
            padding: 10px 25px; /* تصغير المساحة الداخلية */
            font-size: 1.1em; /* تصغير حجم الخط */
            font-weight: 700; 
            border-radius: 6px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            transition: all 0.3s; 
            position: relative; 
            z-index: 2; 
        }
        .hero-btn:hover { background-color: rgba(220, 208, 196, 0.9); transform: scale(1.03); }

        .collection-title { text-align: center; font-size: 1.8em; margin: 40px 0 20px; color: #112d4e; font-weight: 700; }
        
        /* إعدادات السلايدر (السحب للجنب) */
        .slider-wrapper { position: relative; max-width: 1200px; margin: 0 auto 50px; padding: 0 5%; }
        
        .product-track { 
            display: flex; 
            gap: 15px; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            scrollbar-width: none; 
            scroll-behavior: smooth;
            padding-bottom: 10px;
        }
        .product-track::-webkit-scrollbar { display: none; }

        /* كارت المنتج */
        .product-card { 
            flex: 0 0 calc(45% - 10px); /* 🔥 تصغير العرض لـ 45% لإظهار جزء من التالت 🔥 */
            scroll-snap-align: start; 
            text-align: center; background: #fff; transition: 0.3s; border-radius: 12px; overflow: hidden; padding-bottom: 15px; border: 1px solid #112d4e; 
        }
        .product-image { width: 100%; height: 200px; background-color: #eee; object-fit: cover; border-bottom: 1px solid #f0f0f0; margin-bottom: 12px; }
        .product-title { font-size: 1.1em; font-weight: 600; color: #112d4e; margin: 0 0 10px; display: flex; justify-content: center; align-items: center; gap: 8px;}
        
        /* أزرار التقليب أسفل المنتجات */
        .slider-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 15px; color: #555; font-size: 1.1em; font-weight: 600;}
        .slider-controls button { background: none; border: none; font-size: 1.2em; cursor: pointer; color: #888; transition: 0.3s; padding: 5px 15px;}

        footer { background-color: #fafafa; padding: 30px 20px; text-align: center; color: #777; border-top: 1px solid #eee; margin-top: 30px; font-size: 0.9em; }

        .whatsapp-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .whatsapp-btn { background-color: #25D366; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.8em; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); transition: 0.3s; }

        /* تظبيط الموبايل */
        @media (max-width: 600px) {
            .center-logo-container h1 { font-size: 1.4em; }
            .hero { height: 35vh; margin-bottom: 25px;} 
            
            /* 🔥 تصغير الزرار أكتر في الموبايل 🔥 */
            .hero-btn { padding: 8px 18px; font-size: 0.95em; }

            /* 🔥 تصغير عرض الكارت لـ 45% في الموبايل 🔥 */
            .product-card { flex: 0 0 45%; }
            .product-image { height: 160px; }
            .product-title { font-size: 1em; }
        }
    </style>
</head>
<body>

    <header>
        <div class="left-menu-container"><i class="fas fa-bars"></i></div>
        <div class="center-logo-container"><a href="index.html"><h1>Q KIDS</h1></a></div>
        <div class="right-icons-container">
            <div class="lang-btn">EN</div>
            <a href="https://wa.me/201070420400?text=مرحباً، أود البحث عن منتج"><i class="fas fa-search"></i></a>
            <a href="https://wa.me/201070420400?text=مرحباً، أود مراجعة طلبي"><i class="fas fa-shopping-basket"></i></a>
        </div>
    </header>

    <div class="hero">
        <a href="https://wa.me/201070420400?text=مرحباً، أود الاستفسار عن تفاصيل طلب غرفة أطفال كاملة" class="hero-btn">
            لطلب غرفة كاملة
        </a>
    </div>

    <h2 class="collection-title">منتجات Q KIDS</h2>

    <div class="slider-wrapper">
        <div class="product-track" id="productTrack">
            
            <div class="product-card">
                <img src="desk.jpg" alt="مكتب أطفال" class="product-image">
                <a href="kids-desk.html" class="product-title"><i class="fas fa-arrow-left"></i> مكتب أطفال</a>
            </div>

            <div class="product-card">
                <img src="desk.jpg" alt="مكاتب شبابي" class="product-image">
                <a href="youth-desk.html" class="product-title"><i class="fas fa-arrow-left"></i> مكاتب شبابي</a>
            </div>

            <div class="product-card">
                <img src="kitchen.jpg" alt="مطبخ أطفال" class="product-image">
                <a href="kids-kitchen.html" class="product-title"><i class="fas fa-arrow-left"></i> مطبخ أطفال</a>
            </div>

            <div class="product-card">
                <img src="box.jpg" alt="مكتبة أطفال" class="product-image">
                <a href="kids-library.html" class="product-title"><i class="fas fa-arrow-left"></i> مكتبة أطفال</a>
            </div>

            <div class="product-card">
                <img src="box.jpg" alt="تسريحة" class="product-image">
                <a href="dressing-table.html" class="product-title"><i class="fas fa-arrow-left"></i> تسريحة</a>
            </div>

        </div>

        <div class="slider-controls">
            <button id="nextBtn"><i class="fas fa-chevron-right"></i></button>
            <span id="pageIndicator">1 / 5</span>
            <button id="prevBtn"><i class="fas fa-chevron-left"></i></button>
        </div>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة © 2026 Q KIDS</p>
    </footer>

    <div class="whatsapp-container">
        <a href="https://wa.me/201070420400?text=مرحباً، أريد الاستفسار عن التصميمات المتاحة" class="whatsapp-btn">
            <i class="fab fa-whatsapp"></i> 
        </a>
    </div>

    <script>
        const track = document.getElementById('productTrack');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');
        const cards = document.querySelectorAll('.product-card');

        // لما تدوس على السهم الشمال
        prevBtn.addEventListener('click', () => {
            track.scrollBy({ left: -220, behavior: 'smooth' });
        });

        // لما تدوس على السهم اليمين
        nextBtn.addEventListener('click', () => {
            track.scrollBy({ left: 220, behavior: 'smooth' });
        });
    </script>

</body>
</html>
